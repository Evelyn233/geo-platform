<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RAG-Anything 问答系统</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
            overflow: hidden;
        }

        .header {
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
            color: white;
            padding: 30px;
            text-align: center;
        }

        .header h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
        }

        .header p {
            font-size: 1.2em;
            opacity: 0.9;
        }

        .status-bar {
            background: #f8f9fa;
            padding: 15px 30px;
            border-bottom: 1px solid #e9ecef;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .status {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .status-dot {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            background: #dc3545;
        }

        .status-dot.connected {
            background: #28a745;
        }

        .main-content {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 30px;
            padding: 30px;
        }

        .chat-section {
            background: #f8f9fa;
            border-radius: 15px;
            padding: 25px;
        }

        .chat-section h2 {
            color: #2c3e50;
            margin-bottom: 20px;
            font-size: 1.5em;
        }

        .chat-messages {
            height: 400px;
            overflow-y: auto;
            border: 1px solid #e9ecef;
            border-radius: 10px;
            padding: 15px;
            background: white;
            margin-bottom: 20px;
        }

        .message {
            margin-bottom: 15px;
            padding: 12px 16px;
            border-radius: 10px;
            max-width: 80%;
        }

        .message.user {
            background: #007bff;
            color: white;
            margin-left: auto;
            text-align: right;
        }

        .message.assistant {
            background: #e9ecef;
            color: #2c3e50;
            margin-right: auto;
        }

        .message.system {
            background: #fff3cd;
            color: #856404;
            text-align: center;
            margin: 0 auto;
            font-style: italic;
        }

        .input-section {
            display: flex;
            gap: 10px;
            margin-bottom: 15px;
        }

        .mode-selector {
            margin-bottom: 15px;
        }

        .mode-selector label {
            display: block;
            margin-bottom: 5px;
            font-weight: bold;
            color: #2c3e50;
        }

        .mode-selector select {
            width: 100%;
            padding: 8px 12px;
            border: 1px solid #ced4da;
            border-radius: 5px;
            background: white;
        }

        .question-input {
            flex: 1;
            padding: 12px 16px;
            border: 1px solid #ced4da;
            border-radius: 25px;
            font-size: 16px;
            outline: none;
        }

        .question-input:focus {
            border-color: #007bff;
            box-shadow: 0 0 0 2px rgba(0,123,255,0.25);
        }

        .send-btn {
            padding: 12px 24px;
            background: #007bff;
            color: white;
            border: none;
            border-radius: 25px;
            cursor: pointer;
            font-size: 16px;
            transition: background 0.3s;
        }

        .send-btn:hover {
            background: #0056b3;
        }

        .send-btn:disabled {
            background: #6c757d;
            cursor: not-allowed;
        }

        .suggestions {
            background: #e3f2fd;
            border-radius: 15px;
            padding: 25px;
        }

        .suggestions h2 {
            color: #2c3e50;
            margin-bottom: 20px;
            font-size: 1.5em;
        }

        .suggestion-item {
            background: white;
            border: 1px solid #e9ecef;
            border-radius: 8px;
            padding: 12px 16px;
            margin-bottom: 10px;
            cursor: pointer;
            transition: all 0.3s;
        }

        .suggestion-item:hover {
            background: #f8f9fa;
            border-color: #007bff;
            transform: translateY(-2px);
        }

        .loading {
            display: none;
            text-align: center;
            color: #6c757d;
            font-style: italic;
        }

        .loading.show {
            display: block;
        }

        .init-btn {
            background: #28a745;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 14px;
        }

        .init-btn:hover {
            background: #218838;
        }

        .init-btn:disabled {
            background: #6c757d;
            cursor: not-allowed;
        }

        @media (max-width: 768px) {
            .main-content {
                grid-template-columns: 1fr;
                gap: 20px;
                padding: 20px;
            }
            
            .header h1 {
                font-size: 2em;
            }
            
            .chat-messages {
                height: 300px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🤖 RAG-Anything 问答系统</h1>
            <p>基于知识图谱的智能问答平台</p>
        </div>

        <div class="status-bar">
            <div class="status">
                <div class="status-dot" id="statusDot"></div>
                <span id="statusText">RAG系统未连接</span>
            </div>
            <button class="init-btn" id="initBtn" onclick="initializeRAG()">初始化RAG系统</button>
        </div>

        <div class="main-content">
            <div class="chat-section">
                <h2>💬 智能问答</h2>
                
                <div class="mode-selector">
                    <label for="modeSelect">查询模式:</label>
                    <select id="modeSelect">
                        <option value="naive">简单模式 (naive)</option>
                        <option value="hybrid">混合模式 (hybrid)</option>
                        <option value="local">局部模式 (local)</option>
                        <option value="global">全局模式 (global)</option>
                    </select>
                </div>

                <div class="chat-messages" id="chatMessages">
                    <div class="message system">
                        欢迎使用RAG-Anything问答系统！请先初始化RAG系统，然后开始提问。
                    </div>
                </div>

                <div class="loading" id="loading">
                    🤔 正在思考中...
                </div>

                <div class="input-section">
                    <input type="text" class="question-input" id="questionInput" 
                           placeholder="请输入您的问题..." onkeypress="handleKeyPress(event)">
                    <button class="send-btn" id="sendBtn" onclick="sendQuestion()">发送</button>
                </div>
            </div>

            <div class="suggestions">
                <h2>💡 建议问题</h2>
                <div id="suggestionsList">
                    <!-- 建议问题将通过JavaScript动态加载 -->
                </div>
            </div>
        </div>
    </div>

    <script>
        let isInitialized = false;

        // 页面加载时检查状态
        window.onload = function() {
            checkStatus();
            loadSuggestions();
        };

        // 检查RAG系统状态
        async function checkStatus() {
            try {
                const response = await fetch('/api/status');
                const data = await response.json();
                
                const statusDot = document.getElementById('statusDot');
                const statusText = document.getElementById('statusText');
                const initBtn = document.getElementById('initBtn');
                
                if (data.rag_initialized) {
                    statusDot.classList.add('connected');
                    statusText.textContent = 'RAG系统已连接';
                    initBtn.disabled = true;
                    initBtn.textContent = '已初始化';
                    isInitialized = true;
                } else {
                    statusDot.classList.remove('connected');
                    statusText.textContent = 'RAG系统未连接';
                    initBtn.disabled = false;
                    initBtn.textContent = '初始化RAG系统';
                    isInitialized = false;
                }
            } catch (error) {
                console.error('检查状态失败:', error);
            }
        }

        // 初始化RAG系统
        async function initializeRAG() {
            const initBtn = document.getElementById('initBtn');
            initBtn.disabled = true;
            initBtn.textContent = '初始化中...';
            
            try {
                const response = await fetch('/api/initialize', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    }
                });
                
                if (response.ok) {
                    // 等待几秒后重新检查状态
                    setTimeout(() => {
                        checkStatus();
                    }, 3000);
                }
            } catch (error) {
                console.error('初始化失败:', error);
                initBtn.disabled = false;
                initBtn.textContent = '初始化RAG系统';
            }
        }

        // 加载建议问题
        async function loadSuggestions() {
            try {
                const response = await fetch('/api/suggestions');
                const data = await response.json();
                
                const suggestionsList = document.getElementById('suggestionsList');
                suggestionsList.innerHTML = '';
                
                data.suggestions.forEach(suggestion => {
                    const item = document.createElement('div');
                    item.className = 'suggestion-item';
                    item.textContent = suggestion;
                    item.onclick = () => {
                        document.getElementById('questionInput').value = suggestion;
                        sendQuestion();
                    };
                    suggestionsList.appendChild(item);
                });
            } catch (error) {
                console.error('加载建议问题失败:', error);
            }
        }

        // 发送问题
        async function sendQuestion() {
            if (!isInitialized) {
                alert('请先初始化RAG系统！');
                return;
            }

            const questionInput = document.getElementById('questionInput');
            const question = questionInput.value.trim();
            
            if (!question) {
                alert('请输入问题！');
                return;
            }

            const mode = document.getElementById('modeSelect').value;
            const sendBtn = document.getElementById('sendBtn');
            const loading = document.getElementById('loading');
            const chatMessages = document.getElementById('chatMessages');

            // 显示用户问题
            addMessage(question, 'user');
            
            // 清空输入框并禁用发送按钮
            questionInput.value = '';
            sendBtn.disabled = true;
            loading.classList.add('show');

            try {
                const response = await fetch('/api/ask', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        question: question,
                        mode: mode
                    })
                });

                const data = await response.json();

                if (response.ok) {
                    addMessage(data.answer, 'assistant');
                } else {
                    addMessage(`错误: ${data.error}`, 'system');
                }
            } catch (error) {
                addMessage(`网络错误: ${error.message}`, 'system');
            } finally {
                sendBtn.disabled = false;
                loading.classList.remove('show');
            }
        }

        // 添加消息到聊天区域
        function addMessage(text, type) {
            const chatMessages = document.getElementById('chatMessages');
            const messageDiv = document.createElement('div');
            messageDiv.className = `message ${type}`;
            messageDiv.textContent = text;
            chatMessages.appendChild(messageDiv);
            chatMessages.scrollTop = chatMessages.scrollHeight;
        }

        // 处理回车键
        function handleKeyPress(event) {
            if (event.key === 'Enter') {
                sendQuestion();
            }
        }

        // 定期检查状态
        setInterval(checkStatus, 5000);
    </script>
</body>
</html>
